name: Arion World — Deploy Website

on:
  # Runs after the weekly episode pipeline updates website content
  push:
    branches:
      - main
      - claude/automate-story-video-publishing-IjEvh
    paths:
      - 'website/**'
      - 'website/public/content/**'
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build Astro site
        working-directory: website
        env:
          FORMSPREE_FORM_ID: ${{ secrets.FORMSPREE_FORM_ID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on main branch — Pages environment must be enabled in repo settings first
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
