name: Arion World — Weekly Episode

on:
  schedule:
    # Every Monday at 9:00am UTC
    - cron: '0 9 * * 1'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate episode but skip publishing'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish-episode:
    name: Generate & Publish Episode
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: story-publisher/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install -r story-publisher/requirements.txt

      - name: Run publishing pipeline
        if: ${{ inputs.dry_run != 'true' }}
        working-directory: story-publisher/src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TRAILER_PUBLIC_URL: ${{ steps.upload-trailer.outputs.url }}
        run: python pipeline.py

      - name: Run story generation only (dry run)
        if: ${{ inputs.dry_run == 'true' }}
        working-directory: story-publisher/src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          from generate_story import generate_episode
          from story_bible import get_episode_number
          ep = get_episode_number()
          data = generate_episode(ep)
          print('Episode generated:', data['title'])
          print('Scenes:', len(data['scenes']))
          print('Cliffhanger:', data['cliffhanger'])
          "

      - name: Commit updated story bible
        run: |
          git config user.name "Arion World Bot"
          git config user.email "arion-bot@arionworld.auto"
          git add story-publisher/story_bible/
          git diff --staged --quiet || git commit -m "chore(story-bible): update episode $(cat story-publisher/story_bible/.episode_counter)"
          git push origin HEAD

      - name: Upload episode artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: episode-${{ github.run_number }}-output
          path: story-publisher/output/
          retention-days: 7
          if-no-files-found: ignore
