name: Arion World — Weekly Episode

on:
  schedule:
    # Every Monday at 9:00am UTC
    - cron: '0 9 * * 1'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate episode but skip publishing'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish-episode:
    name: Generate & Publish Episode
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: story-publisher/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install -r story-publisher/requirements.txt

      - name: Generate episode (story + voice + images + video + trailer)
        if: ${{ inputs.dry_run != 'true' }}
        working-directory: story-publisher/src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python pipeline.py --mode generate

      - name: Upload trailer to GitHub Releases (public URL for Instagram)
        if: ${{ inputs.dry_run != 'true' }}
        id: upload_trailer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EP_NUM=$(cat story-publisher/story_bible/.episode_counter)
          TAG="ep-${EP_NUM}-trailer"
          TRAILER=$(find story-publisher/output/ep$(printf '%03d' $EP_NUM) -name "*_trailer.mp4" | head -1)
          if [ -z "$TRAILER" ]; then
            echo "trailer_url=" >> $GITHUB_OUTPUT
            echo "No trailer found — Instagram will be skipped"
            exit 0
          fi
          # Delete release if it already exists (idempotent re-runs)
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "Episode ${EP_NUM} — Trailer" \
            --notes "Auto-generated trailer for Episode ${EP_NUM}" \
            --prerelease \
            "$TRAILER"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/$(basename $TRAILER)"
          echo "trailer_url=${URL}" >> $GITHUB_OUTPUT
          echo "Trailer uploaded: ${URL}"

      - name: Publish to all platforms
        if: ${{ inputs.dry_run != 'true' }}
        working-directory: story-publisher/src
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TRAILER_PUBLIC_URL: ${{ steps.upload_trailer.outputs.trailer_url }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          PRINTFUL_API_KEY: ${{ secrets.PRINTFUL_API_KEY }}
        run: python pipeline.py --mode publish

      - name: Run story generation only (dry run)
        if: ${{ inputs.dry_run == 'true' }}
        working-directory: story-publisher/src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          from generate_story import generate_episode
          from story_bible import get_episode_number
          ep = get_episode_number()
          data = generate_episode(ep)
          print('Episode generated:', data['title'])
          print('Scenes:', len(data['scenes']))
          print('Cliffhanger:', data['cliffhanger'])
          "

      - name: Commit updated story bible and website content
        run: |
          git config user.name "Arion World Bot"
          git config user.email "arion-bot@arionworld.auto"
          git add story-publisher/story_bible/ website/public/content/
          git diff --staged --quiet || git commit -m "chore: episode $(cat story-publisher/story_bible/.episode_counter) — update story bible and website"
          git pull --rebase origin HEAD || true
          git push origin HEAD

      - name: Announce episode on Discord (optional)
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          EP_NUM=$(cat story-publisher/story_bible/.episode_counter)
          # Read episode title from the latest episode file
          TITLE=$(python3 -c "
          import json, glob, os
          files = sorted(glob.glob('story-publisher/story_bible/episodes/ep*.json'))
          if files:
              data = json.loads(open(files[-1]).read())
              print(data.get('title', 'New Episode'))
          else:
              print('New Episode')
          " 2>/dev/null || echo "New Episode")

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🎬 Episode ${EP_NUM} is live!\",
                \"description\": \"**${TITLE}**\n\nNew episode of Arion World just published.\",
                \"color\": 15844367,
                \"footer\": {\"text\": \"Arion World\"}
              }]
            }"

      - name: Upload episode artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: episode-${{ github.run_number }}-output
          path: story-publisher/output/
          retention-days: 7
          if-no-files-found: ignore
