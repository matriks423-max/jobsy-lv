name: Arion World — Monthly Token Refresh

on:
  schedule:
    # 1st of every month at 8am UTC (1 hour before any possible Monday publish)
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  refresh-tokens:
    name: Refresh platform API tokens
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: story-publisher/requirements.txt

      - run: pip install -r story-publisher/requirements.txt

      - name: Refresh tokens
        working-directory: story-publisher/src
        env:
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python refresh_tokens.py

      - name: Commit updated token state
        run: |
          git config user.name "Arion World Bot"
          git config user.email "arion-bot@arionworld.auto"
          git add story-publisher/story_bible/.token_state.json || true
          git diff --staged --quiet || git commit -m "chore: update token refresh state"
          git push origin HEAD || true
