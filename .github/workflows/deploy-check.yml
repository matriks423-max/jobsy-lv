name: Deploy Monitor & Auto-Fix

on:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build 2>&1 | tee /tmp/build-output.txt
        continue-on-error: true

      - name: Open issue for Claude to fix build
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build-output.txt', 'utf8');
            const tail = log.split('\n').slice(-80).join('\n');
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `@claude The build broke on commit \`${sha}\` ("${context.payload.head_commit.message}").`,
              ``,
              `**Build errors (last 80 lines):**`,
              `\`\`\``,
              tail,
              `\`\`\``,
              ``,
              `[Full workflow run](${runUrl})`,
              ``,
              `Please fix the build error, commit, and push.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Build failed on main (${sha})`,
              body,
              labels: ['bug'],
            });
            core.setFailed('Build failed — issue created for @claude');

  railway-check:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Wait for Railway deployment to finish
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="b8d1b612-f91a-4459-9dd2-164a8d2925d8"
          ENV_ID="d22af4b3-bf7c-4d84-8287-4fa52170cb5d"
          MAX_WAIT=300
          POLL=10
          ELAPSED=0

          echo "Waiting for Railway deployment triggered by commit ${{ github.sha }}..."

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"{ deployments(input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { edges { node { id status createdAt } } } }\"}")

            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['deployments']['edges']; print(d[0]['node']['status']) if d else print('NONE')" 2>/dev/null)
            DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['deployments']['edges']; print(d[0]['node']['id']) if d else print('')" 2>/dev/null)

            echo "[$ELAPSED s] Status: $STATUS  (id: $DEPLOY_ID)"

            if [ "$STATUS" = "SUCCESS" ]; then
              echo "DEPLOY_STATUS=success" >> $GITHUB_ENV
              echo "Railway deployment succeeded."
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              echo "DEPLOY_STATUS=failed" >> $GITHUB_ENV
              echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV
              echo "Railway deployment FAILED."
              break
            fi

            sleep $POLL
            ELAPSED=$((ELAPSED + POLL))
          done

          if [ "${DEPLOY_STATUS:-}" != "success" ]; then
            echo "DEPLOY_STATUS=failed" >> $GITHUB_ENV
          fi

      - name: Fetch Railway build logs on failure
        if: env.DEPLOY_STATUS == 'failed'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          DEPLOY_ID="${{ env.DEPLOY_ID }}"
          if [ -z "$DEPLOY_ID" ]; then
            echo "No deploy ID, skipping log fetch"
            echo "BUILD_LOG=No deploy ID available." >> $GITHUB_ENV
            exit 0
          fi

          LOGS=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ buildLogs(deploymentId: \\\"$DEPLOY_ID\\\") { message severity } }\"}" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
logs = data.get('data', {}).get('buildLogs', [])
for l in logs:
  print(l.get('message',''))
" 2>/dev/null | tail -60)

          echo "BUILD_LOG<<EOF" >> $GITHUB_ENV
          echo "$LOGS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Open issue for Claude to fix Railway failure
        if: env.DEPLOY_STATUS == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const buildLog = process.env.BUILD_LOG || 'Could not fetch build logs.';
            const body = [
              `@claude Railway deployment FAILED for commit \`${sha}\` ("${context.payload.head_commit.message}").`,
              ``,
              `**Railway build log (last 60 lines):**`,
              `\`\`\``,
              buildLog,
              `\`\`\``,
              ``,
              `[Full workflow run](${runUrl})`,
              ``,
              `Please analyze the error, fix it, commit, and push.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Railway deployment failed on main (${sha})`,
              body,
              labels: ['bug'],
            });
            core.setFailed('Railway deployment failed — issue created for @claude');

  close-stale-issues:
    runs-on: ubuntu-latest
    needs: [build-check, railway-check]
    if: success()
    steps:
      - name: Close any open auto-fix issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug',
            });
            for (const issue of issues.data) {
              if (issue.title.startsWith('🚨')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ Build and Railway deployment both passed on the latest push. Auto-closing.',
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }
