name: Deploy Monitor & Auto-Fix

on:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build 2>&1 | tee /tmp/build-output.txt
        continue-on-error: true

      - name: Open issue for Claude to fix build
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build-output.txt', 'utf8');
            const tail = log.split('\n').slice(-80).join('\n');
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `@claude The build broke on commit \`${sha}\` ("${context.payload.head_commit.message}").`,
              ``,
              `**Build errors (last 80 lines):**`,
              `\`\`\``,
              tail,
              `\`\`\``,
              ``,
              `[Full workflow run](${runUrl})`,
              ``,
              `Please fix the build error, commit, and push.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build failed on main (${sha})`,
              body,
              labels: ['bug'],
            });
            core.setFailed('Build failed - issue created for @claude');

  railway-check:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Wait for Railway deployment to finish
        id: railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="b8d1b612-f91a-4459-9dd2-164a8d2925d8"
          ENV_ID="d22af4b3-bf7c-4d84-8287-4fa52170cb5d"
          MAX_WAIT=300
          POLL=10
          ELAPSED=0
          DEPLOY_STATUS="timeout"
          DEPLOY_ID=""

          GQL_URL="https://backboard.railway.app/graphql/v2"

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESPONSE=$(curl -s -X POST "$GQL_URL" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"query":"{ deployments(input: { serviceId: \"'"$SERVICE_ID"'\", environmentId: \"'"$ENV_ID"'\" }) { edges { node { id status createdAt } } } }"}')

            STATUS=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.status // "NONE"')
            ID=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.id // ""')

            echo "[$ELAPSED s] Status: $STATUS  id: $ID"

            if [ "$STATUS" = "SUCCESS" ]; then
              DEPLOY_STATUS="success"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              DEPLOY_STATUS="failed"
              DEPLOY_ID="$ID"
              break
            fi

            sleep $POLL
            ELAPSED=$((ELAPSED + POLL))
          done

          echo "deploy_status=$DEPLOY_STATUS" >> "$GITHUB_OUTPUT"
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: Fetch Railway build logs on failure
        id: logs
        if: steps.railway.outputs.deploy_status == 'failed'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          DEPLOY_ID="${{ steps.railway.outputs.deploy_id }}"
          GQL_URL="https://backboard.railway.app/graphql/v2"

          BUILD_LOG=$(curl -s -X POST "$GQL_URL" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ buildLogs(deploymentId: \"'"$DEPLOY_ID"'\") { message severity } }"}' \
            | jq -r '.data.buildLogs[].message' | tail -60)

          echo "build_log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BUILD_LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Open issue for Claude to fix Railway failure
        if: steps.railway.outputs.deploy_status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const buildLog = `${{ steps.logs.outputs.build_log }}` || 'Could not fetch build logs.';
            const body = [
              `@claude Railway deployment FAILED for commit \`${sha}\` ("${context.payload.head_commit.message}").`,
              ``,
              `**Railway build log (last 60 lines):**`,
              `\`\`\``,
              buildLog,
              `\`\`\``,
              ``,
              `[Full workflow run](${runUrl})`,
              ``,
              `Please analyze the error, fix it, commit, and push.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Railway deployment failed on main (${sha})`,
              body,
              labels: ['bug'],
            });
            core.setFailed('Railway deployment failed - issue created for @claude');

  close-stale-issues:
    runs-on: ubuntu-latest
    needs: [build-check, railway-check]
    if: success()
    steps:
      - name: Close any open auto-fix issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug',
            });
            for (const issue of issues.data) {
              if (issue.title.startsWith('Build failed') || issue.title.startsWith('Railway deployment failed')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: 'Build and Railway deployment both passed on the latest push. Auto-closing.',
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }
