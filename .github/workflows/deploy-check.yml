name: Deploy Monitor & Auto-Fix

on:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    outputs:
      build_failed: ${{ steps.build.outcome == 'failure' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: npm run build 2>&1 | tee /tmp/build-output.txt
        continue-on-error: true

      - name: Open issue for Claude to fix build
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/build-output.txt', 'utf8');
            const tail = log.split('\n').slice(-80).join('\n');
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `@claude The build broke on commit \`${sha}\` ("${context.payload.head_commit.message}").`,
              ``,
              `**Build errors (last 80 lines):**`,
              `\`\`\``,
              tail,
              `\`\`\``,
              ``,
              `[Full workflow run](${runUrl})`,
              ``,
              `Please fix the build error, commit, and push. Do NOT close this issue manually — it will auto-close when the next build succeeds.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Build failed on main (${sha})`,
              body,
              labels: ['bug'],
            });
            core.setFailed('Build failed — issue created for @claude');

  health-check:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: Wait for Railway to deploy
        run: sleep 150

      - name: Poll health endpoint
        id: health
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://jobsy.lv/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is healthy"
              exit 0
            fi
            sleep 30
          done
          echo "Health check failed"
          exit 1
        continue-on-error: true

      - name: Open issue for Claude to fix runtime failure
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `@claude The build succeeded but https://jobsy.lv/health is returning non-200 after deploying commit \`${sha}\` ("${context.payload.head_commit.message}").`,
              ``,
              `This means the app either crashed on startup or is unhealthy at runtime. Please:`,
              `1. Check recent changes in this commit that could cause a runtime crash`,
              `2. Look for missing env vars, schema mismatches, or bad imports`,
              `3. Fix and push`,
              ``,
              `[Full workflow run](${runUrl})`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Runtime health check failed on main (${sha})`,
              body,
              labels: ['bug'],
            });
            core.setFailed('Health check failed — issue created for @claude');

  close-stale-issues:
    runs-on: ubuntu-latest
    needs: [build-check, health-check]
    if: success()
    steps:
      - name: Close any open auto-fix issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug',
            });
            for (const issue of issues.data) {
              if (issue.title.startsWith('🚨')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '✅ Build and health checks passed on the latest push. Auto-closing.',
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }
