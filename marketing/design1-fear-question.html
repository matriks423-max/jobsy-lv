<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volko Engineering – Design 1: The Fear Question</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Georgia', serif;
    background: #0a0a0a;
  }

  .card {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
  }

  /* Full-bleed background: dramatic house at dusk */
  .bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(
        to bottom,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.3) 40%,
        rgba(0,0,0,0.75) 70%,
        rgba(0,0,0,0.92) 100%
      ),
      url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1080&q=90') center/cover no-repeat;
  }

  /* Gold accent bar – top left */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 8px;
    height: 100%;
    background: linear-gradient(to bottom, #C9A84C, #8B6914, #C9A84C);
  }

  /* Logo area */
  .logo-wrap {
    position: absolute;
    top: 52px;
    left: 52px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 52px;
    height: 52px;
  }

  .logo-text {
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 3.5px;
    color: #C9A84C;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* Main content – bottom area */
  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 68px 80px;
  }

  .tag {
    display: inline-block;
    background: #C9A84C;
    color: #0a0a0a;
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 7px 18px;
    margin-bottom: 44px;
  }

  .headline {
    font-family: 'Georgia', serif;
    font-size: 86px;
    font-weight: bold;
    color: #ffffff;
    line-height: 1.0;
    margin-bottom: 12px;
    letter-spacing: -1px;
  }

  .headline .gold {
    color: #C9A84C;
  }

  .divider {
    width: 90px;
    height: 3px;
    background: #C9A84C;
    margin: 36px 0;
  }

  .sub {
    font-family: 'Arial', sans-serif;
    font-size: 26px;
    color: rgba(255,255,255,0.72);
    line-height: 1.55;
    margin-bottom: 60px;
    max-width: 640px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #C9A84C;
    color: #0a0a0a;
    font-family: 'Arial', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 22px 48px;
    text-decoration: none;
  }

  .cta-arrow {
    font-size: 24px;
    font-weight: 300;
  }

  /* Website bottom right */
  .website {
    position: absolute;
    bottom: 46px;
    right: 52px;
    font-family: 'Arial', sans-serif;
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  /* Dramatic vignette corners */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg"></div>
  <div class="vignette"></div>
  <div class="accent-bar"></div>

  <!-- Logo -->
  <div class="logo-wrap">
    <svg class="logo-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="52" height="52" rx="4" fill="#C9A84C" fill-opacity="0.15"/>
      <!-- Building silhouette -->
      <rect x="20" y="14" width="12" height="28" fill="#C9A84C"/>
      <rect x="8" y="22" width="10" height="20" fill="#C9A84C" opacity="0.7"/>
      <rect x="34" y="19" width="10" height="23" fill="#C9A84C" opacity="0.85"/>
      <rect x="24" y="8" width="4" height="8" fill="#C9A84C"/>
      <!-- Windows -->
      <rect x="23" y="18" width="3" height="3" fill="#0a0a0a" opacity="0.6"/>
      <rect x="23" y="25" width="3" height="3" fill="#0a0a0a" opacity="0.6"/>
      <rect x="23" y="32" width="3" height="3" fill="#0a0a0a" opacity="0.6"/>
    </svg>
    <div class="logo-text">VOLKO<br>ENGINEERING</div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="tag">Bezmaksas izvērtējums</div>
    <div class="headline">
      Vai Tava<br>
      māja ir<br>
      <span class="gold">legāla?</span>
    </div>
    <div class="divider"></div>
    <div class="sub">Uzzini pirms to dara banka,<br>pircējs vai tiesa.</div>
    <a href="#" class="cta">
      Noskaidrot tagad <span class="cta-arrow">→</span>
    </a>
  </div>

  <div class="website">volkoengineering.com</div>
</div>
</body>
</html>
